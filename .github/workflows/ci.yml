name: CI
on:
  pull_request:
    branches: [master]
jobs:
  build-lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - run: yarn install
      - run: yarn run lint
      - run: yarn run test
      - run: yarn run build
